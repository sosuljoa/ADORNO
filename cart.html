<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장바구니 — Adorno</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    .cart-page { max-width: 800px; margin: 0 auto; padding: 140px 48px 80px; }
    .cart-page h1 { font-family: var(--font-display); font-size: 52px; font-weight: 300; margin-bottom: 48px; }
    .cart-empty { color: var(--muted); font-size: 16px; }
    .cart-empty a { color: var(--accent); text-decoration: none; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
    .cart-item-name { font-family: var(--font-display); font-size: 18px; }
    .cart-item-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .cart-item-right { display: flex; align-items: center; gap: 24px; }
    .qty-ctrl { display: flex; align-items: center; gap: 12px; }
    .qty-btn { background: transparent; border: 1px solid var(--border); color: var(--white); width: 28px; height: 28px; cursor: pointer; font-size: 16px; transition: border-color 0.2s; }
    .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
    .item-price { font-family: var(--font-display); font-size: 18px; min-width: 90px; text-align: right; }
    .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; transition: color 0.2s; }
    .remove-btn:hover { color: #e05; }
    .cart-summary { margin-top: 48px; text-align: right; }
    .cart-total { font-family: var(--font-display); font-size: 32px; margin-bottom: 24px; }
    .cart-total span { color: var(--accent); }
    .checkout-btn { display: inline-block; padding: 16px 56px; background: var(--accent); color: var(--black); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; border: none; cursor: pointer; transition: background 0.2s, transform 0.2s; text-decoration: none; }
    .checkout-btn:hover { background: var(--white); transform: translateY(-2px); }
    @media (max-width: 600px) { .cart-page { padding: 120px 20px 60px; } }
  </style>
</head>
<body>
  <nav>
    <div class="logo">ADORNO</div>
    <ul>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#catalog">Shop</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <div class="nav-right">
      <a href="cart.html" class="cart-icon">🛒 <span class="cart-count" id="cartCount">0</span></a>
    </div>
  </nav>

  <div class="cart-page">
    <p class="section-label">My Cart</p>
    <h1>장바구니</h1>
    <div id="cartItems"></div>
    <div class="cart-summary" id="cartSummary" style="display:none">
      <p class="cart-total">합계 <span id="totalPrice"></span></p>
      <button class="checkout-btn">주문하기</button>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <p class="footer-logo">ADORNO</p>
      <p class="footer-copy">© 2026 Adorno. All rights reserved.</p>
    </div>
  </footer>

  <script>
    let cart = JSON.parse(sessionStorage.getItem('adornoCart') || '[]');

    function render() {
      const container = document.getElementById('cartItems');
      const summary = document.getElementById('cartSummary');
      document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);

      if (cart.length === 0) {
        container.innerHTML = '<p class="cart-empty">장바구니가 비어 있습니다. <a href="index.html#catalog">쇼핑 계속하기 →</a></p>';
        summary.style.display = 'none';
        return;
      }

      container.innerHTML = cart.map((item, idx) => `
        <div class="cart-item">
          <div>
            <p class="cart-item-name">${item.name}</p>
            <p class="cart-item-meta">단가 ₩ ${item.price.toLocaleString()}</p>
          </div>
          <div class="cart-item-right">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
              <span>${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
            </div>
            <p class="item-price">₩ ${(item.price * item.qty).toLocaleString()}</p>
            <button class="remove-btn" onclick="removeItem(${idx})">✕</button>
          </div>
        </div>
      `).join('');

      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      document.getElementById('totalPrice').textContent = '₩ ' + total.toLocaleString();
      summary.style.display = 'block';
    }

    function changeQty(idx, delta) {
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) cart.splice(idx, 1);
      save();
    }

    function removeItem(idx) {
      cart.splice(idx, 1);
      save();
    }

    function save() {
      sessionStorage.setItem('adornoCart', JSON.stringify(cart));
      render();
    }

    render();
  </script>
</body>
</html>
