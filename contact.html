<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의하기 — Adorno</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>

    /* ── 페이지 전체 2분할 ── */
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── 왼쪽 패널 : 브랜드 정보 ── */
    .contact-left {
      background: #0d0d0d;
      padding: 160px 64px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--border);
    }


    .contact-left-top .section-label {
      margin-bottom: 20px;
    }

    .contact-left-top h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 5vw, 76px);
      font-weight: 300;
      line-height: 1.05;
      margin-bottom: 28px;
    }

    .contact-left-top p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.9;
      max-width: 360px;
    }

    .contact-info-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 56px;
    }

    .contact-info-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 18px 0;
      border-top: 1px solid var(--border);
    }

    .contact-info-row:last-child {
      border-bottom: 1px solid var(--border);
    }

    .c-info-key {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .c-info-val {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 300;
      text-align: right;
      color: var(--white);
      line-height: 1.5;
    }

    .contact-left-bottom {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 8px;
      color: rgba(200,169,126,0.2);
      user-select: none;
    }

    /* ── 오른쪽 패널 : 폼 ── */
    .contact-right {
      background: #111;
      padding: 160px 64px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-right h2 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 40px;
      color: var(--white);
    }

    /* 폼 필드 */
    .c-form {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .c-field {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
      padding: 20px 0 4px;
      position: relative;
      transition: border-color 0.2s;
    }

    .c-field:last-of-type {
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .c-field label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .c-field input,
    .c-field select,
    .c-field textarea {
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 16px;
      padding: 0 0 16px;
      width: 100%;
      appearance: none;
      resize: none;
    }

    .c-field input::placeholder,
    .c-field textarea::placeholder {
      color: #444;
    }

    .c-field select option {
      background: #1a1a1a;
      color: var(--white);
    }

    /* 포커스 라인 효과 */
    .c-field::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .c-field:focus-within::after {
      width: 100%;
    }

    .c-field:focus-within label {
      color: var(--white);
    }

    /* 제출 버튼 */
    .c-submit {
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font-body);
    }

    .c-submit-text {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white);
      font-weight: 500;
      transition: color 0.2s;
    }

    .c-submit-arrow {
      width: 52px; height: 52px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      color: var(--accent);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }

    .c-submit:hover .c-submit-arrow {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--black);
      transform: translateX(4px);
    }

    .c-submit:hover .c-submit-text {
      color: var(--accent);
    }

    /* ── 반응형 ── */
    @media (max-width: 900px) {
      .contact-layout { grid-template-columns: 1fr; }
      .contact-left {
        position: static;
        height: auto;
        padding: 120px 24px 60px;
      }
      .contact-left-bottom { display: none; }
      .contact-right { padding: 60px 24px 80px; }
    }

  </style>
</head>
<body>

  <nav>
    <div class="logo">ADORNO</div>
    <ul>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#catalog">Shop</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <div class="nav-right">
      <a href="cart.html" class="cart-icon">🛒 <span class="cart-count" id="cartCount">0</span></a>
    </div>
  </nav>

  <div class="contact-layout">

    <!-- 왼쪽 : 브랜드 정보 -->
    <div class="contact-left">
      <div class="contact-left-top">
        <p class="section-label">Contact</p>
        <h1>함께<br>만들어요.</h1>
        <p>제품 문의부터 커스텀 주문까지,<br>Adorno는 당신의 이야기를 듣고 싶습니다.</p>

        <div class="contact-info-list">
          <div class="contact-info-row">
            <span class="c-info-key">이메일</span>
            <span class="c-info-val">hello@adorno.kr</span>
          </div>
          <div class="contact-info-row">
            <span class="c-info-key">운영 시간</span>
            <span class="c-info-val">평일 10:00 – 18:00</span>
          </div>
          <div class="contact-info-row">
            <span class="c-info-key">답변 소요</span>
            <span class="c-info-val">1 – 2 영업일</span>
          </div>
          <div class="contact-info-row">
            <span class="c-info-key">커스텀</span>
            <span class="c-info-val">상담 후 진행</span>
          </div>
        </div>
      </div>

      <div class="contact-left-bottom">ADORNO</div>
    </div>

    <!-- 오른쪽 : 폼 -->
    <div class="contact-right">
      <h2>무엇이든 물어보세요.</h2>

      <form class="c-form" id="contactForm">

        <div class="c-field">
          <label for="c-name">이름</label>
          <input type="text" id="c-name" name="name" placeholder="홍길동">
        </div>

        <div class="c-field">
          <label for="c-email">이메일</label>
          <input type="email" id="c-email" name="email" placeholder="hello@email.com">
        </div>

        <div class="c-field">
          <label for="c-type">문의 유형</label>
          <select id="c-type" name="type">
            <option>제품 문의</option>
            <option>커스텀 주문</option>
            <option>배송 문의</option>
            <option>기타</option>
          </select>
        </div>

        <div class="c-field">
          <label for="c-msg">내용</label>
          <textarea id="c-msg" name="message" placeholder="문의 내용을 자유롭게 입력해주세요." rows="5"></textarea>
        </div>

        <button type="submit" class="c-submit">
          <span class="c-submit-text">보내기</span>
          <span class="c-submit-arrow">→</span>
        </button>

      </form>
    </div>

  </div>

  <div class="toast" id="toast">문의가 접수되었습니다 ✓</div>

  <script>
    let cart = JSON.parse(sessionStorage.getItem('adornoCart') || '[]');
    document.getElementById('cartCount').textContent = cart.reduce((s,i) => s + i.qty, 0);

    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
      this.reset();
    });
  </script>
</body>
</html>
